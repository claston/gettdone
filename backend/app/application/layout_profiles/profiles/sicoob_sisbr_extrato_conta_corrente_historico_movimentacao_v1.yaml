      - "Subtítulo da tabela 'HISTÓRICO DE MOVIMENTAÇÃO'"
      - "Tabela simplificada com colunas 'DATA', 'HISTÓRICO' e 'VALOR'"
      - "Valores usam sufixo 'C' para crédito e 'D' para débito"
      - "Débitos aparecem visualmente em vermelho com sufixo D"
      - "Créditos aparecem visualmente em azul com sufixo C"
