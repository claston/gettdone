      platform: "Plataforma de Serviços Financeiros do Sicoob - SISBR"
      title: "EXTRATO CONTA CORRENTE"
      generated_date: "27/05/2024"
      generated_time: "16:12:12"
      account_identifiers:
        cooperative: unknown
        account: unknown
    metadata:
      period: "01/04/2024 - 30/04/2024"
      start_date: "01/04/2024"
      end_date: "30/04/2024"
    transactions_table:
      representation: "simplified_history_table_with_document_continuation_lines"
      section_title: "HISTÓRICO DE MOVIMENTAÇÃO"
      columns:
        - "DATA"
        - "HISTÓRICO"
        - "VALOR"
      visible_rows:
        - type: opening_balance
          date: "28/03/2024"
          description: "SALDO ANTERIOR"
          document: unknown
          amount: "3.963,57 C"
          balance: "3.963,57 C"
        - type: balance_row
          date: "28/03/2024"
          description: "SALDO BLOQ ANTERIOR"
          document: unknown
          amount: "0,00*"
          balance: "0,00*"
        - type: normal_transaction
          date: "01/04/2024"
          description: "PIX EMIT.OUTRA IF"
          complement: "DOC.: Pix"
          document: "Pix"
          amount: "503,58 D"
