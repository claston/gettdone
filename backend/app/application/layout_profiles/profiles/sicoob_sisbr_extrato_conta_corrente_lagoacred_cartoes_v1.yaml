        confidence: high
        inferred: false
        reason: "Linhas visíveis possuem sufixo C"
      - pattern: "SIPAG_Cred.*"
        sign: positive
        confidence: medium
        inferred: true
        reason: "Complemento de adquirência; confirmar pelo sufixo C na linha principal"
      - pattern: "SIPAG_Deb.*"
        sign: unknown
        confidence: low
        inferred: true
        reason: "Texto representa produto/cartão, não sinal financeiro; usar C/D do valor"
    cautions:
      - "Sufixo C/D deve prevalecer sobre descrição e complemento SIPAG."
      - "Não importar saldos como transações."
      - "Não interpretar asterisco como sinal."
      - "Se a linha complementar for separada, manter vínculo com a transação anterior."
  normalization:
    description_cleanup:
