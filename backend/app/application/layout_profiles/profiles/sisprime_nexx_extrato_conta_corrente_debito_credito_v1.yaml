  transaction_rules:
    opening_balance:
      label_patterns:
        - "Saldo Anterior"
        - "SALDO ANTERIOR"
        - "Saldo Inicial"
        - "SALDO INICIAL"
        - "Saldo Final"
        - "SALDO FINAL"
      should_import_as_transaction: false
      balance_source: "Saldo Util. Cheq. Esp."
      inferred: false
    normal_transaction:
      row_has_date: true
      row_may_have_document: true
      row_has_description: true
      row_may_have_debit: true
      row_may_have_credit: true
      row_may_have_balance: true
      should_import_as_transaction: true
    amount_sign:
      positive_when:
        - "Valor preenchido na coluna Crédito"
      negative_when:
        - "Valor preenchido na coluna Débito"
      inferred: false
    balance_column:
      exists: true
      column_name: "Saldo Util. Cheq. Esp."
      may_be_blank_or_masked_in_visible_rows: true
  normalization_hints:
    likely_credit_patterns:
      - pattern: "Crédito Pix*"
        reason: "Linha visível tem valor na coluna Crédito"
        inferred: false
      - pattern: "Resgate RDC"
        reason: "Linha visível tem valor na coluna Crédito"
        inferred: false
      - pattern: "Ted - FMS"
        reason: "Linhas visíveis têm valor na coluna Crédito"
        inferred: false
    likely_debit_patterns:
      - pattern: "Débito IOF"
        reason: "Linhas visíveis têm valor na coluna Débito"
        inferred: false
      - pattern: "Amor Titulo price -"
        reason: "Linha visível tem valor na coluna Débito"
        inferred: false
      - pattern: "Déb. de Prestamista"
        reason: "Linhas visíveis têm valor na coluna Débito"
        inferred: false
      - pattern: "ADIANT.DEPOSITANTE"
        reason: "Linha visível tem valor na coluna Débito"
        inferred: false
    caution:
      - "Este layout usa colunas separadas de Débito e Crédito; não depender de sinal textual no valor."
      - "Não importar 'Saldo Anterior' como transação."
      - "A coluna de saldo está presente, mas os valores estão ocultos/ilegíveis no recorte."
      - "Nr.Docum. pode estar vazio; parser não deve exigir documento."
      - "Se uma linha tiver débito e crédito preenchidos ao mesmo tempo, marcar para revisão."
  visual_model:
    table_anchor:
      starts_after_text: "Data Nr.Docum. Histórico Débito Crédito Saldo Util. Cheq. Esp."
      header_keywords:
        - "Data"
        - "Nr.Docum."
        - "Histórico"
        - "Débito"
        - "Crédito"
        - "Saldo Util. Cheq. Esp."
    column_order:
      - date
      - document
      - description
      - debit
      - credit
      - balance
    row_behavior:
      separator: "minimal horizontal rules; whitespace aligned columns"
      date_repeated_per_transaction: true
      document_column_may_be_blank: true
      description_left_aligned: true
      debit_right_aligned: true
      credit_right_aligned: true
      balance_right_aligned_when_visible: true
      no_currency_symbol_in_table_values: true
  parser_risks:
    ambiguities:
      - "Valores de saldo não estão visíveis, reduzindo validação por saldo."
      - "A coluna Nr.Docum. está vazia nas linhas visíveis, mas pode aparecer em outras páginas."
      - "Descrições podem ser truncadas, como 'Amor Titulo price -'."
      - "O nome do banco no topo parece parcialmente recortado; usar Sisprime do Brasil com confiança alta, mas validar no PDF real."
      - "A coluna 'Saldo Util. Cheq. Esp.' pode representar saldo disponível com cheque especial, não necessariamente saldo contábil puro."
    fields_that_may_be_missing:
      - "document"
      - "balance"
      - "financial_institution"
      - "account"
      - "account_branch_or_post"
      - "full_description"
    cases_that_need_real_pdf_validation:
      - "Se a camada textual preserva corretamente colunas Débito e Crédito."
      - "Se saldos aparecem preenchidos em todas as linhas ou apenas em algumas."
      - "Se a coluna Nr.Docum. possui valores em outras páginas."
      - "Se descrições longas quebram em múltiplas linhas."
      - "Se a paginação repete cabeçalho e tabela."
      - "Se o saldo 'Util. Cheq. Esp.' deve ser usado como saldo da conta ou apenas saldo disponível."

layout_profile:
  profile_name: sisprime_nexx_extrato_conta_corrente_debito_credito_v1
  bank: Sisprime do Brasil
  layout_family: sisprime_nexx_extrato_debito_credito_columns
  statement_type: conta_corrente_extrato
  confidence: high
  classifier:
    required_keywords:
      - "SISPRIME"
      - "NEXX"
      - "EXTRATO DE CONTA CORRENTE"
      - "Instituição Financeira"
      - "Conta"
      - "Posto da Conta"
      - "Período de"
      - "Data"
      - "Nr.Docum."
      - "Histórico"
      - "Débito"
      - "Crédito"
      - "Saldo Util. Cheq. Esp."
    optional_keywords:
      - "Saldo Anterior"
      - "Débito IOF"
      - "Crédito Pix"
      - "Resgate RDC"
      - "ADIANT.DEPOSITANTE"
      - "Ted - FMS"
      - "Déb. de Prestamista"
    negative_keywords:
      - "Santander"
      - "Banco do Brasil"
      - "Bradesco"
      - "CAIXA"
      - "Itaú"
      - "SICOOB"
      - "Sicredi"
      - "ASAAS"
      - "VIACREDI"
