      - "Banco Topázio"
      - "tribanco"
      - "UNICRED"
      - "IUGU"
      - "iFood"
      - "C6 BANK"
      - "contasimples"
      - "CRESOL"
      - "infinitepay"
      - "inter"
      - "GRAFENO"
      - "mercado pago"
      - "PagBank"
      - "PicPay"
      - "Fatura"
      - "Comprovante"
    min_score_hint: 0.85
  table_detection:
    header_keywords:
      - "Data"
      - "Nr.Docum."
      - "Histórico"
      - "Débito"
      - "Crédito"
      - "Saldo Util. Cheq. Esp."
    expected_column_order:
      - date
      - document
      - description
      - debit
      - credit
      - balance
    column_aliases:
      date:
        - "Data"
      description:
        - "Histórico"
        - "Historico"
        - "Descrição"
      document:
        - "Nr.Docum."
        - "Nr. Docum."
        - "Documento"
        - "Doc."
      amount:
        - "Débito"
        - "Crédito"
        - "Valor"
      debit:
        - "Débito"
        - "Debito"
      credit:
        - "Crédito"
        - "Credito"
      balance:
        - "Saldo Util. Cheq. Esp."
        - "Saldo"
    table_starts_after:
      - "Data Nr.Docum. Histórico Débito Crédito Saldo Util. Cheq. Esp."
      - "Posto da Conta"
    row_separator_hint: "transaction row starts with dd/MM/yyyy; debit and credit are separate numeric columns"
  parsing:
    date_format: "dd/MM/yyyy"
    amount_locale: "pt-BR"
    decimal_separator: ","
    thousands_separator: "."
    negative_patterns:
      - "value_in_debit_column"
    positive_patterns:
      - "value_in_credit_column"
    ignore_rows:
      - "SISPRIME"
      - "NEXX"
      - "Fone Contato"
      - "Instituição Financeira"
      - "EXTRATO DE CONTA CORRENTE"
      - "Conta"
      - "Posto da Conta"
      - "Período de"
      - "Data"
      - "Nr.Docum."
      - "Histórico"
      - "Débito"
      - "Crédito"
      - "Saldo Util. Cheq. Esp."
      - "Saldo Anterior"
      - "SALDO ANTERIOR"
      - "SALDO INICIAL"
      - "SALDO FINAL"
      - "TOTAL"
    opening_balance_rows:
      - "Saldo Anterior"
      - "SALDO ANTERIOR"
      - "SALDO INICIAL"
    required_transaction_fields:
      - date
      - description
      - amount
    optional_transaction_fields:
      - document
      - debit
      - credit
      - balance
  sign_rules:
    priority_order:
      - "debit_or_credit_column"
      - "explicit_negative_sign"
      - "explicit_positive_sign"
      - "balance_consistency"
      - "description_based_hint"
    description_based_overrides:
      - pattern: "Débito IOF"
        sign: negative
        confidence: high
        inferred: false
        reason: "Valor está na coluna Débito"
      - pattern: "Déb. de Prestamista"
        sign: negative
        confidence: high
        inferred: false
        reason: "Valor está na coluna Débito"
      - pattern: "ADIANT.DEPOSITANTE"
        sign: negative
        confidence: high
        inferred: false
        reason: "Valor está na coluna Débito"
      - pattern: "Crédito Pix*"
        sign: positive
        confidence: high
        inferred: false
        reason: "Valor está na coluna Crédito"
      - pattern: "Resgate RDC"
        sign: positive
        confidence: high
        inferred: false
        reason: "Valor está na coluna Crédito"
      - pattern: "Ted - FMS"
        sign: positive
        confidence: high
        inferred: false
        reason: "Valor está na coluna Crédito"
    cautions:
      - "Coluna Débito/Crédito deve prevalecer sobre o texto do histórico."
      - "Não importar Saldo Anterior como transação."
      - "Se ambas as colunas Débito e Crédito estiverem preenchidas, marcar para revisão."
      - "Se ambas estiverem vazias em linha não-saldo, marcar como incompleta."
  normalization:
    description_cleanup:
      - "trim_whitespace"
      - "collapse_multiple_spaces"
      - "preserve_original_description"
      - "merge_wrapped_description_lines"
      - "normalize_case_optional"
    preserve_original_description: true
    category_hints:
      - pattern: "Débito IOF"
        category: "imposto_iof"
        inferred: true
      - pattern: "Crédito Pix*"
        category: "pix_recebido"
        inferred: true
      - pattern: "Déb. de Prestamista"
        category: "seguro_prestamista"
        inferred: true
      - pattern: "Resgate RDC"
        category: "resgate_investimento"
        inferred: true
      - pattern: "ADIANT.DEPOSITANTE"
        category: "adiantamento_depositante"
        inferred: true
      - pattern: "Ted - FMS"
        category: "ted_recebida"
        inferred: true
    transfer_hints:
      - pattern: "Crédito Pix"
        category: "transferencia_pix_entrada"
        inferred: true
      - pattern: "Pix"
        category: "transferencia_pix"
        inferred: true
      - pattern: "Ted"
        category: "transferencia_ted"
        inferred: true
    fee_hints:
      - pattern: "IOF"
        category: "imposto_iof"
        inferred: true
      - pattern: "Tarifa"
        category: "tarifa_bancaria"
        inferred: true
      - pattern: "Juros"
        category: "juros"
        inferred: true
  validation:
    expected_min_columns: 6
    reject_if_missing_headers:
      - "Data"
      - "Histórico"
      - "Débito"
      - "Crédito"
    balance_consistency_check:
      enabled: true
      method: "when balance is available, validate previous_balance - debit + credit equals current_balance; otherwise validate debit/credit mutual exclusivity"
      tolerance: "0.01"
    needs_manual_review_when:
      - "both_debit_and_credit_positive"
      - "debit_and_credit_both_empty"
      - "balance_column_masked_or_missing"
      - "description_truncated"
      - "document_required_but_missing"
      - "ocr_confidence_low_on_column_alignment"
      - "balance_consistency_fails"
  examples_from_image:
    sample_rows:
      - raw_date: unknown
        raw_description: "Saldo Anterior"
        raw_document: unknown
        raw_amount: unknown
        raw_balance: unknown
        normalized_amount: "0.00"
        should_import_as_transaction: false
        notes: "Linha de saldo anterior; não importar"
      - raw_date: "01/11/2024"
        raw_description: "Débito IOF"
        raw_document: unknown
        raw_amount: "Débito 543,49"
        raw_balance: unknown
        normalized_amount: "-543.49"
        should_import_as_transaction: true
        notes: "Débito pela coluna Débito"
      - raw_date: "04/11/2024"
        raw_description: "Crédito Pix - INSTITUTO DO VER VIT"
        raw_document: unknown
        raw_amount: "Crédito 5.200,00"
        raw_balance: unknown
        normalized_amount: "5200.00"
        should_import_as_transaction: true
        notes: "Crédito pela coluna Crédito"
      - raw_date: "06/11/2024"
        raw_description: "Resgate RDC"
        raw_document: unknown
        raw_amount: "Crédito 500,00"
        raw_balance: unknown
        normalized_amount: "500.00"
        should_import_as_transaction: true
        notes: "Crédito pela coluna Crédito"
      - raw_date: "06/11/2024"
        raw_description: "ADIANT.DEPOSITANTE"
        raw_document: unknown
        raw_amount: "Débito 100,00"
        raw_balance: unknown
        normalized_amount: "-100.00"
        should_import_as_transaction: true
        notes: "Débito pela coluna Débito"
      - raw_date: "14/11/2024"
        raw_description: "Ted - FMS"
        raw_document: unknown
        raw_amount: "Crédito 35.204,93"
        raw_balance: unknown
        normalized_amount: "35204.93"
        should_import_as_transaction: true
        notes: "Crédito pela coluna Crédito"
  implementation_notes:
    - "Classificar por SISPRIME/NEXX e tabela com colunas Débito e Crédito separadas."
    - "Calcular normalized_amount como crédito - débito."
    - "Não exigir Nr.Docum.; aparece vazio no recorte."
    - "Filtrar Saldo Anterior antes da importação."
    - "Usar saldo apenas quando estiver legível; neste recorte está ausente/oculto."
    - "Validar com PDF real se as linhas mantêm alinhamento de colunas e se há descrições multi-linha."
