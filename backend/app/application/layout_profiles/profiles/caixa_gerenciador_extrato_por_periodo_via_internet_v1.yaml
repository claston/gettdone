meta_model:
  layout_id: caixa_gerenciador_extrato_por_periodo_via_internet_v1
  bank: Caixa Econômica Federal
  channel: Gerenciador Caixa via internet
  statement_type: conta_corrente_extrato_por_periodo
  source_quality: image_inferred
  confidence: high
  detection_signals:
    strong:
      - "Título 'Extrato por período'"
      - "Subtítulo 'Via internet'"
      - "Logo 'GERENCIADOR CAIXA' visível no topo direito"
      - "Bloco 'Emitido em' com data/hora"
      - "Campos 'Cliente', 'Agência', 'Produto' e 'Conta'"
      - "Faixa com texto 'Lançamentos de 01/05/2024 à 31/05/2024'"
      - "Tabela gradeada com colunas 'DATA DE LANÇAMENTO', 'DATA DE MOVIMENTO', 'DOCUMENTO', 'HISTÓRICO', 'VALOR (R$)', 'SALDO (R$)'"
    weak:
      - "Dados de cliente/agência/produto/conta aparecem ocultos ou ilegíveis"
      - "Os valores aparecem sem separador decimal brasileiro na imagem, usando ponto como decimal"
      - "Não há sufixo C/D visível nas linhas exibidas"
      - "Linhas 'SALDO DIA' têm valor e saldo iguais e não devem ser importadas como transações"
    table_headers:
      - "DATA DE LANÇAMENTO"
      - "DATA DE MOVIMENTO"
      - "DOCUMENTO"
      - "HISTÓRICO"
      - "VALOR (R$)"
      - "SALDO (R$)"
  page_structure:
    header:
