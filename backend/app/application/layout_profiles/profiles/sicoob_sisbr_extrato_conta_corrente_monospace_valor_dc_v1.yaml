meta_model:
  layout_id: sicoob_sisbr_extrato_conta_corrente_monospace_valor_dc_v1
  bank: Sicoob
  channel: SISBR
  statement_type: conta_corrente_extrato
  source_quality: image_inferred
  confidence: high
  detection_signals:
    strong:
      - "Cabeçalho central 'SICOOB'"
      - "Texto 'SISTEMA DE COOPERATIVAS DE CRÉDITO DO BRASIL'"
      - "Texto 'SISBR - SISTEMA DE INFORMÁTICA DO SICOOB'"
      - "Título 'EXTRATO CONTA CORRENTE'"
      - "Campos 'COOP.' e 'CONTA'"
      - "Tabela em fonte monoespaçada com colunas 'DATA', 'DOCUMENTO', 'HISTÓRICO' e 'VALOR'"
      - "Valores usam sufixo 'C' para crédito e 'D' para débito"
      - "Linhas de saldo como 'SALDO ANTERIOR', 'SALDO BLOQUEADO ANTERIOR' e 'SALDO DO DIA'"
      - "Históricos como 'CRÉD.TED-STR', 'TRANSF.RECEBIDA - PIX SICOOB', 'CHEQUE COMPE INTEGRADA', 'DÉB.IOF', 'JUROS CONTA GARANTIDA' e 'PIX RECEBIDO - OUTRA IF'"
      - "Valores de crédito aparecem visualmente em azul e débitos em vermelho"
    weak:
      - "Dados de cooperativa e conta estão ocultos ou ilegíveis"
      - "Algumas linhas estão parcialmente mascaradas/ilegíveis"
      - "Não há coluna de saldo separada; a coluna VALOR também é usada em linhas de saldo"
      - "Há linhas de saldo e linhas normais no mesmo corpo da tabela"
      - "O layout é parecido com outro Sicoob/SISBR, mas em estilo monoespaçado/legado"
    table_headers:
      - "DATA"
      - "DOCUMENTO"
      - "HISTÓRICO"
      - "VALOR"
  page_structure:
    header:
      bank_logo: "SICOOB"
      institution: "Sistema de Cooperativas de Crédito do Brasil"
      platform: "SISBR - Sistema de Informática do Sicoob"
      title: "EXTRATO CONTA CORRENTE"
      account_identifiers:
        cooperative: unknown
        account: unknown
    metadata:
      explicit_period: unknown
    transactions_table:
      representation: "monospace_legacy_table"
      columns:
        - "DATA"
        - "DOCUMENTO"
        - "HISTÓRICO"
        - "VALOR"
      visible_rows:
        - type: opening_balance
          date: "31/07/2023"
          document: unknown
          description: "SALDO ANTERIOR"
          amount: unknown
          balance: unknown
        - type: balance_row
          date: "31/07/2023"
          document: unknown
          description: "SALDO BLOQUEADO ANTERIOR"
          amount: "0,00*"
          balance: "0,00*"
        - type: normal_transaction
          date: "01/08/2023"
          document: unknown
          description: "CRÉD.TED-STR"
          amount: "643,62C"
          balance: unknown
        - type: normal_transaction
          date: "01/08/2023"
          document: unknown
          description: "TRANSF.RECEBIDA - PIX SICOOB"
          amount: "3,00C"
          balance: unknown
        - type: normal_transaction
          date: "01/08/2023"
          document: unknown
          description: "TRANSF.RECEBIDA - PIX SICOOB"
          amount: "601,22C"
          balance: unknown
        - type: normal_transaction
          date: "01/08/2023"
          document: "000.979"
          description: "CHEQUE COMPE INTEGRADA"
          amount: "68,90D"
          balance: unknown
        - type: normal_transaction
          date: "01/08/2023"
          document: "IOF/1-8"
          description: "DÉB.IOF"
          amount: "10,40D"
          balance: unknown
        - type: normal_transaction
          date: "01/08/2023"
          document: "IOF/1-8"
          description: "DEB.IOF"
          amount: "44,50D"
          balance: unknown
        - type: normal_transaction
          date: "01/08/2023"
          document: unknown
          description: "JUROS CONTA GARANTIDA"
          amount: "494,43D"
          balance: unknown
        - type: balance_row
          date: "01/08/2023"
