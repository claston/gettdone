  transaction_rules:
    opening_balance:
      label_patterns:
        - "SALDO ANTERIOR"
        - "SALDO BLOQUEADO ANTERIOR"
        - "SALDO DO DIA"
        - "SALDO FINAL"
      should_import_as_transaction: false
      balance_source: "VALOR column on saldo rows"
      inferred: false
    normal_transaction:
      row_has_date: true
      row_may_have_document: true
      row_has_description: true
      row_has_amount: true
      row_may_have_balance: false
      should_import_as_transaction: true
    amount_sign:
      positive_when:
        - "Valor termina com sufixo 'C'"
      negative_when:
        - "Valor termina com sufixo 'D'"
      inferred: false
    balance_column:
      exists: false
      column_name: unknown
      saldo_rows_use_value_column: true
  normalization_hints:
    likely_credit_patterns:
      - pattern: "CRÉD.TED-STR"
        reason: "Linha visível possui sufixo C"
        inferred: false
      - pattern: "TRANSF.RECEBIDA - PIX SICOOB"
        reason: "Linhas visíveis possuem sufixo C"
        inferred: false
      - pattern: "PIX RECEBIDO - OUTRA IF"
        reason: "Linha visível possui sufixo C"
        inferred: false
    likely_debit_patterns:
      - pattern: "CHEQUE COMPE INTEGRADA"
        reason: "Linha visível possui sufixo D"
        inferred: false
      - pattern: "DÉB.IOF"
        reason: "Linha visível possui sufixo D"
        inferred: false
      - pattern: "DEB.IOF"
        reason: "Linha visível possui sufixo D"
        inferred: false
      - pattern: "JUROS CONTA GARANTIDA"
        reason: "Linha visível possui sufixo D"
        inferred: false
    caution:
      - "Não importar linhas de saldo, como 'SALDO ANTERIOR', 'SALDO BLOQUEADO ANTERIOR' e 'SALDO DO DIA'."
      - "O sufixo C/D é a principal fonte de sinal; não usar apenas cor ou descrição."
      - "Asterisco em '0,00*' deve ser tratado como anotação, não como sinal."
      - "O campo DOCUMENTO pode estar ausente, numérico, textual ou em formato especial como 'IOF/1-8'."
      - "Em layout monoespaçado, a extração por posição pode ser mais confiável que detecção visual de tabela."
  visual_model:
    table_anchor:
      starts_after_text: "DATA DOCUMENTO HISTÓRICO VALOR"
      header_keywords:
        - "DATA"
        - "DOCUMENTO"
        - "HISTÓRICO"
        - "VALOR"
    column_order:
      - date
      - document
      - description
      - amount
    row_behavior:
      separator: "monospace whitespace alignment; no visible grid"
      date_repeated_per_transaction: true
      document_may_be_blank: true
      document_may_be_text_or_code: true
      description_uppercase: true
      amount_right_aligned: true
      credit_debit_suffix: true
      credit_color_hint: "blue"
      debit_color_hint: "red"
      no_balance_column: true
  parser_risks:
    ambiguities:
      - "A tabela não tem grade; depende de alinhamento monoespaçado e OCR pode deslocar colunas."
      - "Linhas de saldo têm data e valor, mas não são transações."
      - "Alguns documentos aparecem parcialmente mascarados ou podem ser confundidos com histórico."
      - "Não há saldo por transação."
      - "Cores ajudam visualmente, mas a regra robusta deve ser o sufixo C/D."
    fields_that_may_be_missing:
      - "document"
      - "balance"
      - "cooperative"
      - "account"
      - "period"
      - "full_description"
    cases_that_need_real_pdf_validation:
      - "Se a camada textual mantém colunas por espaçamento monoespaçado."
      - "Se todos os valores monetários terminam com C/D."
      - "Como continuam descrições longas em linhas seguintes."
      - "Se há saldos finais e totais no fim do extrato."
      - "Se os documentos com pontos, barras e hífens são preservados."
      - "Se páginas seguintes repetem cabeçalho e estrutura."

