name: CI | Lint and Tests

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Playwright
        run: python -m pip install playwright

      - name: Install Playwright browser (Chromium)
        run: python -m playwright install chromium

      - name: Frontend text lint (UTF-8 and mojibake)
        working-directory: .
        run: python scripts/lint_frontend_text.py

      - name: Frontend navigation lint (links and route-safe auth paths)
        working-directory: .
        run: python scripts/lint_frontend_navigation.py

      - name: Frontend navigation smoke (Playwright)
        working-directory: .
        run: python scripts/smoke_playwright_navigation.py

      - name: Lint (Ruff)
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest -q
